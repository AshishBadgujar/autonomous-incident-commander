global:
  resolve_timeout: 30s

route:
  receiver: kestra-incident-webhook
  group_wait: 5s
  group_interval: 15s
  repeat_interval: 5m

receivers:
  - name: kestra-incident-webhook
    webhook_configs:
      - url: http://kestra:8080/api/v1/main/executions/webhook/incident.app/autonomous_incident/local-incident-key
        send_resolved: true
        http_config:
          basic_auth:
            username: admin@local.dev
            password: Admin1234!
