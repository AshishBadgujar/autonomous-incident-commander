<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident App</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #17212f;
      --muted: #657386;
      --line: #d8e0e8;
      --soft: #eef3f8;
      --ok: #0d7d5a;
      --ok-bg: #e8f6ef;
      --bad: #b6382d;
      --bad-bg: #fae9e7;
      --brand: #2557a7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 20px;
      font-weight: 760;
    }

    h2 {
      font-size: 15px;
      font-weight: 740;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      font-weight: 720;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    button.danger {
      color: var(--bad);
      border-color: #dfb4ae;
    }

    button:disabled {
      cursor: wait;
      opacity: .65;
    }

    a {
      color: var(--brand);
      font-weight: 680;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .light {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--ok-bg);
      border: 1px solid #b9dfcf;
    }

    .light.bad {
      background: var(--bad-bg);
      border-color: #e3b7b1;
    }

    .state {
      font-size: 30px;
      font-weight: 790;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .summary {
      margin-top: 8px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(260px, .9fr) minmax(320px, 1.1fr);
      gap: 14px;
      align-items: start;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px solid var(--soft);
    }

    .row:first-child { border-top: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .pill.ok {
      background: var(--ok-bg);
      border-color: #b9dfcf;
      color: var(--ok);
    }

    .pill.bad {
      background: var(--bad-bg);
      border-color: #e3b7b1;
      color: var(--bad);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
      overflow-wrap: anywhere;
    }

    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .toast {
      padding: 10px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--muted);
      font-weight: 650;
    }

    .toast.ok {
      background: var(--ok-bg);
      color: var(--ok);
    }

    .toast.bad {
      background: var(--bad-bg);
      color: var(--bad);
    }

    details {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 16px;
    }

    summary {
      cursor: pointer;
      font-weight: 740;
    }

    pre {
      margin: 12px 0 0;
      max-height: 280px;
      overflow: auto;
      border-radius: 6px;
      background: #101720;
      color: #dce7f7;
      padding: 12px;
      font-size: 12px;
    }

    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .status,
      .two-col { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .state { font-size: 25px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Incident App</h1>
      <div class="muted" id="updated">Loading</div>
    </div>
    <div class="actions">
      <button id="refresh">Refresh</button>
      <button id="recover" class="danger">Recover</button>
      <button id="run" class="primary">Run Test Incident</button>
    </div>
  </header>

  <main>
    <section>
      <div class="status">
        <div id="light" class="light"></div>
        <div>
          <div id="state" class="state">Checking service</div>
          <div id="summary" class="summary">Waiting for local services.</div>
        </div>
      </div>
      <div class="grid">
        <div class="metric"><span>Stored Incidents</span><strong id="incidents">0</strong></div>
        <div class="metric"><span>Activity Events</span><strong id="events">0</strong></div>
        <div class="metric"><span>Recoveries</span><strong id="recoveries">0</strong></div>
      </div>
    </section>

    <section>
      <h2>What Happened Last</h2>
      <div id="last-incident"></div>
      <div class="links" id="links"></div>
    </section>

    <div class="two-col">
      <section>
        <h2>Current Safety Check</h2>
        <div id="safety"></div>
        <div id="toast" class="toast">Ready</div>
      </section>

      <section>
        <h2>Recent Activity</h2>
        <ul id="logs"></ul>
      </section>
    </div>

    <details>
      <summary>Advanced details</summary>
      <pre id="raw"></pre>
    </details>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const buttons = ["refresh", "recover", "run"];

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

    const setBusy = (busy) => {
      buttons.forEach((id) => $(id).disabled = busy);
    };

    const toast = (message, type = "") => {
      $("toast").className = `toast ${type}`;
      $("toast").textContent = message;
    };

    const shortTime = (iso) => {
      if (!iso) return "unknown";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return iso;
      return date.toLocaleString([], { hour: "2-digit", minute: "2-digit", month: "short", day: "numeric" });
    };

    const row = (name, value) => `
      <div class="row">
        <span>${escapeHtml(name)}</span>
        <strong>${escapeHtml(value)}</strong>
      </div>
    `;

    async function load() {
      setBusy(true);
      try {
        const response = await fetch("/api/overview");
        const data = await response.json();
        const health = data.health || {};
        const healthy = health.healthy === true;
        const policy = data.policy || {};
        const incidents = data.memory?.incidents || [];
        const latest = incidents[0];

        $("light").className = `light ${healthy ? "" : "bad"}`;
        $("state").textContent = healthy ? "Everything is healthy" : "Incident is active";
        $("summary").textContent = healthy
          ? `local demo service is running. Last incident: ${health.last_incident_id || "none"}.`
          : `${health.failure_reason || "The service is failing."}`;
        $("incidents").textContent = data.memory?.count ?? 0;
        $("events").textContent = data.logs?.count ?? 0;
        $("recoveries").textContent = health.recoveries_total ?? 0;
        $("updated").textContent = `Updated ${shortTime(data.updated_at)}`;

        $("last-incident").innerHTML = latest ? [
          row("Incident", latest.incident_id),
          row("Status", latest.status),
          row("Action", latest.recommended_action || "none"),
          row("Time", shortTime(latest.created_at))
        ].join("") : `<div class="muted">No incident has been recorded yet.</div>`;

        $("safety").innerHTML = [
          row("Auto-fix", policy.allowed ? "allowed" : "blocked"),
          row("Action", policy.action || "restart-demo-api"),
          row("Owner", data.catalog?.owner || "local-owner")
        ].join("");

        $("links").innerHTML = [
          ["Kestra", data.links?.kestra],
          ["Executions", data.links?.kestra_executions],
          ["Prometheus", data.links?.prometheus]
        ].filter((item) => item[1]).map(([label, url]) =>
          `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`
        ).join("");

        $("logs").innerHTML = (data.logs?.logs || []).slice().reverse().slice(0, 5).map((item) => `
          <li>
            <div class="log-head">
              <strong>${escapeHtml(item.level)}</strong>
              <span class="muted">${escapeHtml(shortTime(item.timestamp))}</span>
            </div>
            <div>${escapeHtml(item.message)}</div>
            <div class="muted">${escapeHtml(item.incident_id || "no incident")}</div>
          </li>
        `).join("") || `<li class="muted">No activity yet.</li>`;

        $("raw").textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        toast(`Could not refresh: ${error.message}`, "bad");
      } finally {
        setBusy(false);
      }
    }

    async function post(path, message) {
      setBusy(true);
      toast("Working...");
      try {
        const response = await fetch(path, { method: "POST" });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || response.statusText);
        $("raw").textContent = JSON.stringify(result, null, 2);
        toast(message, "ok");
        setTimeout(load, 1200);
      } catch (error) {
        toast(error.message, "bad");
      } finally {
        setBusy(false);
      }
    }

    $("refresh").addEventListener("click", load);
    $("recover").addEventListener("click", () => post("/api/recover", "Recovery requested"));
    $("run").addEventListener("click", () => post("/api/run-incident", "Test incident started"));

    load();
    setInterval(load, 8000);
  </script>
</body>
</html>
